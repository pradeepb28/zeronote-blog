{{ define "main" }}

<article class="post-single">
  
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>

    {{ with .Params.description }}
      <p class="post-description">{{ . }}</p>
    {{ end }}

    <div class="post-meta">
      {{ .Date.Format "Jan 2, 2006" }}
    </div>
  </header>

  <div class="post-entry">
    {{ .Content }}
  </div>

</article>

<div id="cta-box">
  <p><strong>Try Zero Note</strong></p>
  <p class="cta-sub">Scan to share a self-destructing note.</p>
  <img src="/qr.png" alt="Download Zero Note" />
  <a href="https://apps.apple.com/us/app/zero-note-self-destruct-notes/id6760115126" target="_blank">
    <img src="/appstore-badge-dark.svg" class="badge-dark" />
    <img src="/appstore-badge-light.svg" class="badge-light" />
  </a>
</div>

<div id="mobile-cta">
  <div style="display:flex; justify-content:center; align-items:center;">
    <a href="https://apps.apple.com/us/app/zero-note-self-destruct-notes/id6760115126" target="_blank">
      <img src="/appstore-badge-dark.svg" class="badge-dark" />
      <img src="/appstore-badge-light.svg" class="badge-light" />
    </a>
  </div>
</div>

<script>
  const isMobile = window.innerWidth <= 768;
  const cta = document.getElementById("cta-box");

  if (cta && !isMobile) {
    window.addEventListener("scroll", () => {
      const scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);

      cta.style.display = scrollPercent > 0.05 ? "block" : "none";
    });
  }

  const mobileCTA = document.getElementById("mobile-cta");

  if (mobileCTA) {
    window.addEventListener("scroll", () => {
      const scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);

      if (scrollPercent > 0.1) {
        mobileCTA.style.display = "block";
      } else {
        mobileCTA.style.display = "none";
      }
    });
  }
</script>



{{ end }}
