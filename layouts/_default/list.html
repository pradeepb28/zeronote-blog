{{ define "main" }}
<div class="post-grid">
  {{ range .Pages }}
    <article class="post-card">
      <a href="{{ .RelPermalink }}">
        <h2>{{ .Title }}</h2>

                <div class="tags">
          {{ range .Params.tags }}
            <span class="tag">{{ . }}</span>
          {{ end }}
        </div>

        <span class="meta">
          {{ .Date.Format "Jan 2, 2006" }} · {{ .ReadingTime }} min
        </span>
      </a>
    </article>
  {{ end }}
</div>
{{ end }}
