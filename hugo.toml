baseURL = "https://blog.zeronote.app"
title = "Zero Note: Self-destruct shareable notes"
theme = "PaperMod"
disableKinds = ["taxonomy", "term"]

[params]
  defaultTheme = "auto"
  description = "Share notes or messages without friction."
  ShowReadingTime = true
  ShowPostNavLinks = true
  disableSpecial1stPost = true
  ShowBreadCrumbs = true
  customCSS = ["css/extended/custom.css"]
  mainSections = ["posts", "alternatives", "comparisons"]

[taxonomies]
  tag = "tags"

[menu]
  [[menu.main]]
    name = "Home"
    url = "https://zeronote.app"
    weight = 1

  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "Alternatives"
    url = "/alternatives/"
    weight = 3

  [[menu.main]]
    name = "Comparisons"
    url = "/comparisons/"
    weight = 4